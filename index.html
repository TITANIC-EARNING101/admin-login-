
    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITANIC EARNING PLATFORM OFFICIAL </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        /* DARK THEME ACCORDING TO YOUR SCREENSHOTS */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #1a202c; color: #e2e8f0; padding-bottom: 50px; }

        /* HEADER */
        .admin-header { 
            background: #e74c3c; color: white; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            margin: 15px; border-radius: 12px; font-weight: bold; font-size: 20px;
        }
        .back-btn { 
            background: #2d3748; color: white; border: none; padding: 6px 15px; 
            border-radius: 6px; cursor: pointer; font-size: 14px; 
        }

        .container { padding: 0 15px; max-width: 600px; margin: 0 auto; }

        /* CARD STYLE */
        .admin-card { 
            background: #2d3748; padding: 15px; border-radius: 10px; 
            margin-bottom: 20px; border-left: 4px solid #3498db; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .admin-card h3 { font-size: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        
        /* SPECIFIC BORDER COLORS FROM SCREENSHOTS */
        .border-blue { border-left-color: #3498db; }
        .border-purple { border-left-color: #9b59b6; }
        .border-red { border-left-color: #e74c3c; }
        .border-green { border-left-color: #2ecc71; }
        .border-orange { border-left-color: #f39c12; }

        /* FORM CONTROLS */
        .auth-label { display: block; font-size: 12px; color: #a0aec0; margin-bottom: 5px; font-weight: bold; }
        .form-control { 
            width: 100%; padding: 12px; border: 1px solid #4a5568; border-radius: 8px; 
            background: #1a202c; color: white; outline: none; margin-bottom: 12px; font-size: 14px;
        }
        textarea.form-control { resize: none; }

        /* WARNING BOX FOR EARNING STATUS */
        .warning-box { 
            background: rgba(184, 134, 11, 0.2); border: 1px solid #b8860b; 
            padding: 10px; border-radius: 8px; margin-bottom: 15px; 
        }

        /* BUTTONS */
        .btn-action { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; 
            color: white; font-weight: bold; cursor: pointer; margin-bottom: 5px;
        }
        .btn-blue { background: #3498db; }
        .btn-purple { background: #9b59b6; }
        .btn-green { background: #2ecc71; }
        .btn-red { background: #e74c3c; }

        /* USER DETAIL BOX (SCREENSHOT STYLE) */
        .user-detail-box { 
            background: #1e293b; padding: 15px; border-radius: 10px; 
            border: 1px solid #334155; margin-bottom: 15px; 
        }
        .user-header { border-bottom: 1px solid #334155; padding-bottom: 10px; margin-bottom: 10px; }
        .ceo-badge { background: #e74c3c; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; }
        .user-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .text-green { color: #2ecc71; font-weight: bold; }

        /* LOGIN OVERLAY */
        #login-screen {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#1a202c;
            display: flex; justify-content: center; align-items: center; z-index: 9999;
        }
    </style>
</head>
<body>

    <!-- PASSWORD PROTECTION -->
    <div id="login-screen">
        <div style="background:#2d3748; padding:30px; border-radius:15px; width:90%; max-width:350px; text-align:center;">
            <h2 style="color:#e74c3c; margin-bottom:20px;">TITANIC ACCESS</h2>
            <input type="password" id="admin-pass" class="form-control" placeholder="Password">
            <button class="btn-action btn-red" onclick="checkAuth()">Access </button>
        </div>
    </div>

    <div id="main-content" style="display:none;">
        <div class="admin-header">
            <span><i class="fas fa-users-cog"></i> TITANIC EARNING PLATFORM OFFICIAL</span>
            <button class="back-btn" onclick="location.reload()">Back</button>
        </div>

        <div class="container">
            <!-- SYSTEM SETTINGS -->
            <div class="admin-card border-blue">
                <h3><i class="fas fa-cog"></i> System Settings</h3>
                <div class="warning-box">
                    <label class="auth-label" style="color:#f39c12;">Global Earning Status</label>
                    <select id="set-stop-earnings" class="form-control">
                        <option value="false">Earnings ON (Normal Mode)</option>
                        <option value="true">Earnings STOPPED</option>
                    </select>
                    <label class="auth-label">Reason for Stopping</label>
                    <input type="text" id="set-stop-reason" class="form-control" placeholder="Today market off">
                </div>
                <label class="auth-label">Popup Notification Text</label>
                <textarea id="set-notif" class="form-control" rows="4"></textarea>
                <label class="auth-label">Payment Receiver Name</label>
                <input type="text" id="set-bank-name" class="form-control">
                <label class="auth-label">Payment IBAN / Account Number</label>
                <input type="text" id="set-bank-iban" class="form-control">
                <button class="btn-action btn-blue" onclick="saveSettings()">Update Settings</button>
            </div>

            <!-- CUSTOM TOOLS -->
            <div class="admin-card border-blue">
                <h3><i class="fas fa-wrench"></i> Create Custom Tool / Link</h3>
                <label class="auth-label">Tool Name</label>
                <input type="text" id="tool-name" class="form-control">
                <label class="auth-label">Icon Class</label>
                <input type="text" id="tool-icon" class="form-control" value="fas fa-star">
                <label class="auth-label">Tool URL</label>
                <input type="text" id="tool-link" class="form-control">
                <button class="btn-action btn-blue" onclick="addTool()">Add Tool</button>
            </div>

            <!-- CREATE PLAN -->
            <div class="admin-card border-purple">
                <h3><i class="fas fa-layer-group"></i> Create New Plan</h3>
                <label class="auth-label">Plan Name</label>
                <input type="text" id="plan-name" class="form-control">
                <label class="auth-label">Plan Price (Rs)</label>
                <input type="number" id="plan-price" class="form-control">
                <label class="auth-label">Daily Videos</label>
                <input type="number" id="plan-vids" class="form-control">
                <label class="auth-label">Reward Per Ad</label>
                <input type="number" id="plan-reward" class="form-control">
                <button class="btn-action btn-purple" onclick="addPlan()">Add Plan</button>
            </div>

            <!-- MANAGE PLANS -->
            <div class="admin-card border-red">
                <h3 style="color:#e74c3c;"><i class="fas fa-trash"></i> Manage / On-Off Plans</h3>
                <div id="plans-list"></div>
            </div>

            <!-- PROMO CODES -->
            <div class="admin-card border-blue">
                <h3>Create & Manage Promo Codes</h3>
                <input type="text" id="promo-code" class="form-control" placeholder="CODE">
                <input type="number" id="promo-amt" class="form-control" placeholder="Amount">
                <button class="btn-action btn-green" onclick="addPromo()">Create Promo</button>
                <div id="promos-list" style="margin-top:10px;"></div>
            </div>

            <!-- PENDING SECTIONS -->
            <div class="admin-card border-blue"><h3>Pending Plan Approvals</h3><div id="pending-plans"></div></div>
            <div class="admin-card border-green"><h3>Pending Renewals</h3><div id="pending-renewals"></div></div>
            <div class="admin-card border-orange"><h3>Pending Withdrawals</h3><div id="pending-withdrawals"></div></div>
            <div class="admin-card border-purple"><h3>User Complaints</h3><div id="pending-complaints"></div></div>

            <!-- USER ACCOUNTS -->
            <div class="admin-card border-blue">
                <h3>All User Accounts (Detailed)</h3>
                <div id="users-list"></div>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURATION (Same as yours)
        const firebaseConfig = {
            apiKey: "AIzaSyAUrAjlAnF5o86YYZn911dNg0Hkbgp3Pnc",
            authDomain: "titanic-earning.firebaseapp.com",
            databaseURL: "https://titanic-earning-default-rtdb.firebaseio.com",
            projectId: "titanic-earning",
            storageBucket: "titanic-earning.firebasestorage.app",
            messagingSenderId: "912644789036",
            appId: "1:912644789036:web:d8fb6ce76367e1c8a7d289"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function checkAuth() {
            if(document.getElementById('admin-pass').value === "Ta.732419") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                loadAdminData();
            } else { alert("Wrong Password!"); }
        }

        function loadAdminData() {
            // Settings
            db.ref('settings').on('value', snap => {
                let s = snap.val() || {};
                document.getElementById('set-stop-earnings').value = s.stop_earnings || "false";
                document.getElementById('set-stop-reason').value = s.stop_reason || "";
                document.getElementById('set-notif').value = s.notification_text || "";
                document.getElementById('set-bank-name').value = s.admin_name || "";
                document.getElementById('set-bank-iban').value = s.admin_iban || "";
            });

            // Plans
            db.ref('plans').on('value', snap => {
                let html = "";
                snap.forEach(ch => {
                    let p = ch.val();
                    html += `<div style="background:#1a202c; padding:10px; border-radius:8px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                        <span><b>${p.name}</b> <span style="color:${p.status==='off'?'#e74c3c':'#2ecc71'}">(${p.status==='off'?'OFF':'ON'})</span><br><small>Rs. ${p.price}</small></span>
                        <div>
                            <button onclick="togglePlan('${ch.key}', '${p.status}')" style="background:#2ecc71; border:none; padding:5px 10px; color:white; border-radius:4px; cursor:pointer;">${p.status==='off'?'Turn ON':'Turn OFF'}</button>
                            <button onclick="deletePlan('${ch.key}')" style="background:#e74c3c; border:none; padding:5px 10px; color:white; border-radius:4px; cursor:pointer;">Delete</button>
                        </div>
                    </div>`;
                });
                document.getElementById('plans-list').innerHTML = html;
            });

            // Users (SCREENSHOT STYLE)
            db.ref('users').on('value', snap => {
                let html = "";
                snap.forEach(ch => {
                    let u = ch.val();
                    let key = ch.key;
                    let isCEO = u.role === 'admin';
                    
                    html += `
                    <div class="user-detail-box">
                        <div class="user-header">
                            <b style="font-size:16px;">${u.name}</b> ${isCEO ? '<span class="ceo-badge">CEO</span>' : ''}<br>
                            <span style="font-size:12px; color:#a0aec0;"><i class="fas fa-envelope"></i> ${u.email}</span><br>
                            <span style="font-size:12px; color:#a0aec0;"><i class="fas fa-key"></i> ${u.password}</span><br>
                            <span style="font-size:12px; color:#a0aec0;"><i class="fas fa-link"></i> Invite Code: <b>${u.invite_code}</b></span><br>
                            <span style="font-size:12px; color:#a0aec0;"><i class="fas fa-phone"></i> Phone: <b>${u.phone || 'Not Bound'}</b></span>
                        </div>
                        <div class="user-row"><span>Bal: <span class="text-green">Rs.${u.balance}</span></span> <span>Plan: <b>${u.plan_id || 'None'}</b></span></div>
                        <div class="user-row"><span style="color:#f39c12;">Expiry: Active</span> <span>Total Bought: 0</span></div>
                        <div class="user-row"><span>Invites: ${u.invites || 0}</span> <span>Videos: ${u.videos_watched || 0}</span></div>
                        
                        <div style="margin-top:10px;">
                            <label class="auth-label" style="color:#3498db;">Send Direct Message to User:</label>
                            <input type="text" id="msg-${key}" class="form-control" placeholder="Type message..." value="${u.custom_message || ''}">
                            <button onclick="sendMsg('${key}')" class="btn-action btn-green">Update/Send Message</button>
                        </div>
                        
                        <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
                            <span style="font-size:12px;">Status: <span style="color:#2ecc71;">Active</span></span>
                            <input type="text" id="block-${key}" class="form-control" placeholder="Block Reason" style="margin:0; flex:1;">
                            <button onclick="blockUser('${key}')" class="btn-action btn-red" style="width:auto; margin:0;">Block</button>
                        </div>
                    </div>`;
                });
                document.getElementById('users-list').innerHTML = html;
            });

            // Pending Approvals
            db.ref('users').orderByChild('plan_status').equalTo('pending').on('value', snap => {
                let html = "";
                snap.forEach(ch => {
                    let u = ch.val();
                    html += `<div style="background:#1e293b; padding:10px; border-radius:8px; margin-bottom:10px; border-left:4px solid #3498db;">
                        <b>${u.name}</b> (Trx: ${u.payment_trx})<br>
                        <button onclick="approvePlan('${ch.key}')" class="btn-action btn-green" style="margin-top:5px;">Approve</button>
                    </div>`;
                });
                document.getElementById('pending-plans').innerHTML = html || "No pending plans.";
            });
            
            // Promos
            db.ref('promos').on('value', snap => {
                let html = "";
                snap.forEach(ch => {
                    html += `<div style="background:#1a202c; padding:8px; border-radius:6px; display:flex; justify-content:space-between; margin-bottom:5px;">
                        <span>${ch.key} (Rs. ${ch.val().amount})</span>
                        <button onclick="deletePromo('${ch.key}')" style="background:#e74c3c; border:none; color:white; padding:2px 8px; border-radius:4px;">Delete</button>
                    </div>`;
                });
                document.getElementById('promos-list').innerHTML = html;
            });
        }

        // --- FUNCTIONS ---
        function saveSettings() {
            db.ref('settings').update({
                stop_earnings: document.getElementById('set-stop-earnings').value === 'true',
                stop_reason: document.getElementById('set-stop-reason').value,
                notification_text: document.getElementById('set-notif').value,
                admin_name: document.getElementById('set-bank-name').value,
                admin_iban: document.getElementById('set-bank-iban').value
            }).then(() => alert("Settings Updated!"));
        }

        function addPlan() {
            let n = document.getElementById('plan-name').value;
            let p = document.getElementById('plan-price').value;
            let v = document.getElementById('plan-vids').value;
            let r = document.getElementById('plan-reward').value;
            db.ref('plans').push({ name: n, price: p, videos: v, ad_reward: r, status: 'active', days: 90 }).then(() => alert("Plan Added!"));
        }

        function togglePlan(id, status) {
            db.ref('plans/' + id).update({ status: status === 'active' ? 'off' : 'active' });
        }

        function deletePlan(id) { if(confirm("Delete Plan?")) db.ref('plans/' + id).remove(); }

        function addPromo() {
            let c = document.getElementById('promo-code').value.toUpperCase();
            let a = document.getElementById('promo-amt').value;
            db.ref('promos/' + c).set({ amount: parseInt(a) }).then(() => alert("Promo Created!"));
        }

        function deletePromo(c) { db.ref('promos/' + c).remove(); }

        function approvePlan(uid) {
            db.ref('users/' + uid).update({ plan_status: 'active', plan_approved_at: Date.now() }).then(() => alert("Approved!"));
        }

        function sendMsg(uid) {
            let m = document.getElementById('msg-' + uid).value;
            db.ref('users/' + uid).update({ custom_message: m }).then(() => alert("Message Sent!"));
        }

        function blockUser(uid) {
            let r = document.getElementById('block-' + uid).value;
            if(!r) return alert("Enter reason!");
            db.ref('users/' + uid).update({ blocked: true, block_reason: r }).then(() => alert("Blocked!"));
        }
    </script>
</body>
</html>
